<!-- Задание №4. Выделение фрагментов текста (B, I, U) -->
<HTML>
 <HEAD>
  <TITLE>Расписание</TITLE>
 </HEAD>
 <BODY>
  <P><B>Расписание</B> <I>занятий</I> <U>на вторник</U></P>
  <P><B><I>Жирный курсив</I></B>, <B><U>жирный подчёркнутый</U></B>,
     <I><U>курсив подчёркнутый</U></I>.</P>
 </BODY>
</HTML>
