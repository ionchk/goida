name: Check Python labs and bot

on:
  push:
    branches: [main]
    paths:
      - 'python-labs/**'
      - 'telegram-bot/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'python-labs/**'
      - 'telegram-bot/**'
      - '.github/workflows/python.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bot dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r telegram-bot/requirements.txt

      - name: Compile-check all Python sources
        run: |
          python -m compileall -q python-labs telegram-bot

      - name: Run non-GUI Python labs
        run: |
          set -e
          python python-labs/lab1/main.py | tail -3
          python python-labs/lab2/main.py | tail -3
          python python-labs/lab4/main.py | tail -3
          python python-labs/lab5/main.py | tail -3
          python python-labs/lab6/main.py | tail -3

      - name: Validate bot module imports
        env:
          BOT_TOKEN: dummy
          TEACHER_CHAT_ID: '0'
        run: |
          python -c "import importlib, sys; sys.path.insert(0, 'telegram-bot'); importlib.import_module('bot'); print('bot module imports OK')"
