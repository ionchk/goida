<!-- Задание №8. Выравнивание текста по горизонтали (ALIGN) -->
<HTML>
 <HEAD>
  <TITLE>Расписание</TITLE>
 </HEAD>
 <BODY>
  <P ALIGN="center"><FONT SIZE="6">Расписание занятий</FONT></P>
  <P ALIGN="left">по левому краю — 1 пара. Информатика</P>
  <P ALIGN="center">по центру — 2 пара. Математика</P>
  <P ALIGN="right">по правому краю — 3 пара. Английский</P>
  <P ALIGN="justify">
   по ширине — это длинный абзац, который нужен для того, чтобы было видно,
   как браузер выравнивает текст по обоим краям, добавляя пробелы между словами.
  </P>
 </BODY>
</HTML>
