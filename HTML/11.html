<!-- Задание №11. Использование атрибутов изображения
     (ALT, BORDER, ALIGN, HEIGHT, WIDTH, VSPACE, HSPACE) -->
<HTML>
 <HEAD>
  <TITLE>Расписание</TITLE>
 </HEAD>
 <BODY>
  <H1 ALIGN="center">Расписание занятий на вторник</H1>
  <IMG SRC="img/school.svg"
       ALT="Здание школы"
       BORDER="2"
       ALIGN="left"
       WIDTH="160"
       HEIGHT="112"
       VSPACE="10"
       HSPACE="15">
  <P>Школа №5, второй этаж, кабинет 207. Изображение прижато по левому краю,
     текст обтекает его справа. Указаны явные размеры, рамка и отступы.</P>
  <P>Атрибут ALT обеспечивает текстовое описание для случаев, когда картинка
     не загрузилась или используется screen reader.</P>
 </BODY>
</HTML>
